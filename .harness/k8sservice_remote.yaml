---
service:
  serviceDefinition:
    type: "Kubernetes"
    spec:
      manifests:
      - manifest:
          identifier: "manifest"
          type: "K8sManifest"
          spec:
            store:
              type: "Harness"
              spec:
                files:
                - "account:/Sample K8s Manifests/nginx.yaml"
            skipResourceVersioning: false
            enableDeclarativeRollback: false
  gitOpsEnabled: false
  orgIdentifier: "default"
  projectIdentifier: "GitX_Remote"
  identifier: "k8sservice_remote"
  tags: {}
  name: "k8s-service - remote"
