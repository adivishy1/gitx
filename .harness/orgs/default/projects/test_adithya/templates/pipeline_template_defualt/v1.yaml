template:
  name: pipeline template defualt
  identifier: pipeline_template_defualt
  versionLabel: v1
  type: Pipeline
  projectIdentifier: test_adithya
  orgIdentifier: default
  tags: {}
  spec:
    stages:
      - stage:
          name: sfd
          identifier: sfd
          description: ""
          type: Approval
          spec:
            execution:
              steps:
                - step:
                    name: fsd
                    identifier: fsd
                    type: HarnessApproval
                    timeout: 1d
                    spec:
                      approvalMessage: |-
                        Please review the following information
                        and approve the pipeline progression
                      includePipelineExecutionHistory: true
                      approvers:
                        minimumCount: 1
                        disallowPipelineExecutor: false
                        userGroups: <+input>
                      isAutoRejectEnabled: false
                      approverInputs: []
          tags: {}
